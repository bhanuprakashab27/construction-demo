<div class="login-page">

<div class="login-card">

     <h4 class="text-center mb-2">Admin Login</h4>
<h3 class="text-center mb-4"><span style="color:var(--primary-color)">
        <i class="fas fa-building"></i>
      </span>
      Sthapatya Inc</h3>
     

<form (ngSubmit)="login()">

<input
type="email"
class="form-control mb-3"
placeholder="Email"
[(ngModel)]="email"
name="email"
required>

<input
type="password"
class="form-control mb-3"
placeholder="Password"
[(ngModel)]="password"
name="password"
required>

<button class="btn btn-warning w-100">
Login
</button>

</form>

</div>

</div>
