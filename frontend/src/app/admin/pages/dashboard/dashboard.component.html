<div class="dashboard">

  <h3 class="page-title">Dashboard</h3>

  <div class="row g-4">

    <!-- Projects -->

    <div class="col-lg-3 col-md-6">

      <div class="stat-card projects">

        <div class="stat-icon">
          <i class="fas fa-building"></i>
        </div>

        <div>
          <h4>{{stats.projects}}</h4>
          <p>Total Projects</p>
        </div>

      </div>

    </div>


    <!-- Services -->

    <div class="col-lg-3 col-md-6">

      <div class="stat-card services">

        <div class="stat-icon">
          <i class="fas fa-tools"></i>
        </div>

        <div>
          <h4>{{stats.services}}</h4>
          <p>Total Services</p>
        </div>

      </div>

    </div>


    <!-- Testimonials -->

    <div class="col-lg-3 col-md-6">

      <div class="stat-card testimonials">

        <div class="stat-icon">
          <i class="fas fa-comments"></i>
        </div>

        <div>
          <h4>{{stats.testimonials}}</h4>
          <p>Total Testimonials</p>
        </div>

      </div>

    </div>


    <!-- Contacts -->

    <div class="col-lg-3 col-md-6">

      <div class="stat-card contacts">

        <div class="stat-icon">
          <i class="fas fa-envelope"></i>
        </div>

        <div>
          <h4>{{stats.contacts}}</h4>
          <p>Total Messages</p>
        </div>

      </div>

    </div>

  </div>

</div>
