<div class="dashboard">

<!-- STATS CARDS -->

<div class="row g-4">

<div class="col-md-3" *ngFor="let stat of stats">

<div class="stat-card">

<div class="icon">
<i [class]="stat.icon"></i>
</div>

<div class="info">
<h3>{{stat.count}}</h3>
<p>{{stat.title}}</p>
</div>

</div>

</div>

</div>


<!-- RECENT LEADS -->

<div class="card mt-5">

<div class="card-header">

<h5>Recent Leads</h5>

</div>

<div class="card-body p-0">

<table class="table mb-0">

<thead>

<tr>
<th>Name</th>
<th>Message</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let lead of leads | slice:0:5">

<td>{{lead.name}}</td>

<td>{{lead.message}}</td>

<td>

<span
class="badge"
[ngClass]="lead.status==='new' ? 'bg-warning' : 'bg-success'">

{{lead.status}}

</span>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
