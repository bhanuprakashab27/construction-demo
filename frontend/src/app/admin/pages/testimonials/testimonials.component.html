<div class="page-header">

<h3>Testimonials</h3>

<button
class="btn btn-warning"
(click)="resetModal()"
data-bs-toggle="modal"
data-bs-target="#testimonialModal">

<i class="fas fa-plus"></i> Add Testimonial

</button>

</div>


<div class="table-responsive d-none d-md-block">

<table class="table testimonial-table">

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Role</th>
<th>Rating</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let t of testimonials; let i=index">

<td>

<img [src]="t.image" class="client-img">

</td>

<td>{{t.name}}</td>

<td>{{t.role}}</td>

<td>
  <i *ngFor="let star of createStars(t.rating)" 
     class="fas fa-star text-warning">
  </i>
</td>

<td>

<span class="badge bg-success">
{{t.status}}
</span>

</td>

<td>

<button
class="btn btn-sm btn-primary me-2"
(click)="editTestimonial(t,t.id)"
data-bs-toggle="modal"
data-bs-target="#testimonialModal">

<i class="fas fa-edit"></i>

</button>

<button
class="btn btn-sm btn-danger"
(click)="deleteTestimonial(t.id)">

<i class="fas fa-trash"></i>

</button>

</td>

</tr>

</tbody>

</table>

</div>

<!-- mobile view -->

<div class="mobile-cards d-md-none">

  <div class="card mb-3" *ngFor="let t of testimonials; let i=index">

    <div class="card-body">

      <!-- Top Row: Title + Buttons -->
      <div class="d-flex justify-content-between align-items-start mb-2">

        <!-- Left: Icon + Title -->
        <div class="d-flex align-items-start flex-grow-1 me-2">
          <img class="card-img" [src]="t.image">

          <!-- Title wraps properly -->
          <strong class="ms-2 text-wrap" style="word-break: break-word;">
            {{ t.name }}
          </strong>
        </div>

        <!-- Right: Edit/Delete Buttons -->
        <div class="d-flex flex-shrink-0">
          <button
            class="btn btn-sm me-1 p-1"
            data-bs-toggle="modal"
            data-bs-target="#serviceModal"
            (click)="editTestimonial(t,t.id)">
            <i class="fas fa-edit text-primary"></i>
          </button>

          <button class="btn btn-sm p-1"
                  (click)="deleteTestimonial(t.id)">
            <i class="fas fa-trash text-danger"></i>
          </button>
        </div>

      </div>

      <!-- Status Badge -->
      <div class="mb-2">
      <span><strong>Status: &nbsp;</strong></span>  <span class="badge bg-success">{{ t.status | titlecase}}</span>
      </div>

     <div class="mb-2">
        <span class=""><strong>Role:&nbsp;</strong>{{ t.role | titlecase}}</span>
      </div>
       <div class="mb-2">
        <span class=""><strong>Rating:&nbsp;</strong> <i *ngFor="let star of createStars(t.rating)" 
     class="fas fa-star text-warning">
  </i></span>
      </div>
      

    </div>

  </div>

</div>
<!--  -->


<div class="modal fade" id="testimonialModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

{{ editMode ? 'Edit Testimonial' : 'Add Testimonial' }}

</h5>

<button
class="btn-close"
data-bs-dismiss="modal"
(click)="resetModal()">
</button>

</div>


<div class="modal-body">

<form [formGroup]="testimonialForm" (ngSubmit)="saveTestimonial()">

<div class="row">

<div class="col-md-6 mb-3">

<label>Client Name</label>

<input
class="form-control"
formControlName="name">

</div>


<div class="col-md-6 mb-3">

<label>Role</label>

<input
class="form-control"
formControlName="role">

</div>


<div class="col-md-6 mb-3">

<label>Rating</label>

<select
class="form-control"
formControlName="rating">

<option value="5">5 Stars</option>
<option value="4">4 Stars</option>
<option value="3">3 Stars</option>

</select>

</div>


<div class="col-md-6 mb-3">

<label>Status</label>

<select
class="form-control"
formControlName="status">

<option value="active">Active</option>
<option value="inactive">Inactive</option>

</select>

</div>


<div class="col-md-12 mb-3">

<label>Message</label>

<textarea
rows="4"
class="form-control"
formControlName="message">
</textarea>

</div>


<div class="col-md-12 mb-3">

<label>Client Photo</label>

<input
type="file"
class="form-control"
(change)="onImageSelect($event)"
#imageInput>

</div>

</div>


<div *ngIf="imagePreview">

<img
[src]="imagePreview"
class="client-preview">

</div>


<div class="text-end">

<button
type="button"
class="btn btn-secondary me-2"
data-bs-dismiss="modal"
(click)="resetModal()">

Cancel

</button>

<button class="btn btn-success" data-bs-dismiss="modal">

{{ editMode ? 'Update' : 'Save' }}

</button>

</div>

</form>

</div>

</div>

</div>

</div>
