<div class="admin-container">

  <!-- Sidebar -->

  <aside class="admin-sidebar" [class.open]="sidebarOpen">

    <h4 class="logo">Sthapatya Admin</h4>

    <ul class="menu">

      <li routerLinkActive="active">
        <a routerLink="/admin/dashboard" (click)="closeSidebar()">
          <i class="fas fa-home"></i> Dashboard
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/admin/projects" (click)="closeSidebar()">
          <i class="fas fa-building"></i> Projects
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/admin/services" (click)="closeSidebar()">
          <i class="fas fa-tools"></i> Services
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/admin/testimonials" (click)="closeSidebar()">
          <i class="fas fa-comments"></i> Testimonials
        </a>
      </li>

      <li routerLinkActive="active">
        <a routerLink="/admin/contacts" (click)="closeSidebar()">
          <i class="fas fa-envelope"></i> Contacts
        </a>
      </li>

    </ul>

  </aside>


  <!-- Main -->

  <div class="admin-main">

    <!-- Navbar -->

    <header class="admin-navbar">

      <button class="menu-btn" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>

      <h5>Admin Panel</h5>

      <button class="btn btn-sm btn-danger">
        Logout
      </button>

    </header>


    <!-- Page Content -->

    <div class="admin-content">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
